<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{TITLE}}</title>
    <script>
      addEventListener("beforeunload", function () {
        sessionStorage.setItem("y", String(scrollY));
      });
      addEventListener("load", function () {
        var y = sessionStorage.getItem("y");
        if (y !== null) scrollTo(0, parseInt(y, 10));
      });
    </script>
    <style>
      body {
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        line-height: 1.6;
        color: #1f2328;
        background: #ffffff;
      }
      a {
        color: #0969da;
      }
      img {
        max-width: 100%;
        height: auto;
      }
      hr {
        border: 0;
        border-top: 1px solid #d0d7de;
        margin: 1.5rem 0;
      }
      blockquote {
        margin: 0 0 1rem 0;
        padding: 0 1em;
        color: #656d76;
        border-left: 0.25em solid #d0d7de;
      }
      pre {
        background: #f6f8fa;
        padding: 1rem;
        overflow-x: auto;
        border-radius: 6px;
      }
      code {
        background: #f6f8fa;
        padding: 0.2em 0.4em;
        border-radius: 3px;
      }
      pre code {
        background: none;
        padding: 0;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #d0d7de;
        padding: 8px;
        text-align: left;
      }
      th {
        background-color: #f6f8fa;
      }
      .sourceCode a {
        color: inherit;
        text-decoration: none;
      }
      .kw,
      .cf,
      .op {
        color: #cf222e;
      }
      .dt,
      .bu {
        color: #953800;
      }
      .dv,
      .bn,
      .fl,
      .cn {
        color: #0550ae;
      }
      .st,
      .ch,
      .vs,
      .ss {
        color: #0a3069;
      }
      .co {
        color: #6e7781;
        font-style: italic;
      }
      .fu {
        color: #8250df;
      }
      .pp,
      .im {
        color: #cf222e;
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: #e6edf3;
          background: #0d1117;
        }
        a {
          color: #4493f8;
        }
        hr {
          border-top-color: #30363d;
        }
        blockquote {
          color: #8b949e;
          border-left-color: #30363d;
        }
        pre,
        code {
          background: #161b22;
        }
        pre code {
          background: none;
        }
        th,
        td {
          border-color: #30363d;
        }
        th {
          background-color: #161b22;
        }
        .kw,
        .cf,
        .op {
          color: #ff7b72;
        }
        .dt,
        .bu {
          color: #ffa657;
        }
        .dv,
        .bn,
        .fl,
        .cn {
          color: #79c0ff;
        }
        .st,
        .ch,
        .vs,
        .ss {
          color: #a5d6ff;
        }
        .co {
          color: #8b949e;
        }
        .fu {
          color: #d2a8ff;
        }
        .pp,
        .im {
          color: #ff7b72;
        }
      }
    </style>
  </head>
  <body>
    {{BODY}}
  </body>
</html>
